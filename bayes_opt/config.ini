# HALO CH4 flux inversion configuration (consumed by run_halo.py)
#
# Paths are resolved relative to where you launch the script. Adjust to your
# layout. The defaults below point at the in-repo HALO data.
#
# Any value here can be overridden per-run without editing this file:
#   python run_halo.py config.ini --set section.key=value   (repeatable)
# e.g. --set buffer.enabled=true --set prior.scalar_stddev=0.3

[jacobian]
# Flights to assimilate. Two ways to specify:
#   (a) dir + flights : one or more flight ids (Jacobian file stems) under dir,
#       assimilated jointly (shared flux state, per-flight background + offset).
#       Override at the CLI with --flights for experiments.
#   (b) path          : a single Jacobian file (back-compat; used if no flights).
dir = ../stilt/harvard_jacobians
flights = 20230726_1
path = ../stilt/harvard_jacobians/20230726_1.nc
in_memory = true
row_chunk = 16

[domain]
# NYC core mask as [lat_min, lat_max, lon_min, lon_max]. Keep tight while
# testing: it sets the state dimension and the I/O / solve cost.
bbox = [40.0, 42.0, -75, -72.5]

[emissions]
# Inventory file. EDGAR, EPA, and Pittsburgh are THREE ALTERNATIVE inventories of
# the same NYC emissions (each already contains all source sectors), so they are
# never combined in one inversion. A single run uses one as the prior; the
# comparison mode (run_halo.py --compare) inverts each separately to quantify how
# prior-dependent the flux estimate is.
path = ../nyc_ch4_emissions.h5
# primary inventory used as the prior for a single run:
inventory = pitt
# inventories iterated by --compare mode:
compare = edgar,epa,pitt

[prior]
# Prior std-dev on the (dimensionless) per-cell scalars, and the spatial
# correlation range (km) of the compact-support spherical model (0 = diagonal).
scalar_stddev = 0.5
correlation_length_km = 5.0

[background]
# Per-flight, lower-envelope planar background subtracted from the observed
# columns to form enhancements (see halo_oe/background.py).
#   method            = planar (default) | constant
#   degree            = polynomial degree in (lat,lon); 1 = plane (recommended)
#   envelope_quantile = fraction of lowest-residual points the fit tracks (clean air)
#   n_iter            = lower-envelope refinement iterations
# For method=constant, set constant_value (else falls back to [observations] baseline).
method = planar
degree = 1
envelope_quantile = 0.25
n_iter = 5
# Restrict the planar fit to receptors INSENSITIVE to the inversion domain, so the
# baseline is not set using the in-domain enhancement we are retrieving (avoids
# circularity / signal suppression). Receptors whose domain sensitivity (row sum
# of the masked Jacobian) is in this lowest fraction are used for the fit; the
# surface is still evaluated at all receptors. 1.0 = use all receptors (off).
domain_sensitivity_quantile = 0.5

[observations]
# Observation-error covariance R. The background above is subtracted to form
# enhancements; [observations] baseline is only a fallback if the planar fit
# cannot run (missing receptor coordinates).
#
# error_model:
#   simple     : diagonal R = error_stddev^2 (x error_inflation)
#   components : R = diag(measurement) + correlated model-data-mismatch (MDM),
#                where adjacent receptors' MDM correlate along-track (overlapping
#                column footprints). Recommended; tune the magnitudes (see below
#                and goe.tuning) so reduced chi-square ~ 1.
error_model = components
baseline = 1.9
error_stddev = 0.02
error_inflation = 1.0
# --- used when error_model = components ---
measurement_stddev = 0.01           # per-receptor retrieval 1-sigma (ppm)
mdm_stddev = 0.02                    # representation+transport 1-sigma (ppm)
mdm_correlation_length_km = 10.0     # along-track decorrelation length (0 = diagonal)
# --- outlier rejection (avoid biasing fluxes with gross errors) ---
# Flag + drop observations whose normalized residual exceeds outlier_threshold,
# then re-solve. 0 disables. outlier_kind:
#   innovation (default, recommended) : (z - H xa) / sqrt(diag(H Sa Hᵀ + R)) — the
#       proper gross-error check; normalizes by the full expected mismatch so the
#       prior spread is accounted for and the fit cannot first hide an outlier.
#   posterior : (z - H x̂) / sqrt(diag R) — multiples of the model-data mismatch
#       only; cheaper but fit-dependent.
outlier_threshold = 0
outlier_kind = innovation
outlier_iterations = 2

[offset]
# Per-flight residual background offset block, optimized jointly with the fluxes
# and sitting on top of the fitted planar background. Keep enabled with a prior
# tight enough that it nudges the overall level without absorbing real signal.
#   n_groups = 0 disables; 1 = single offset for this flight
#   stddev   = prior std-dev on the offset (ppm); tighten to limit its freedom
n_groups = 1
stddev = 0.02

[buffer]
# Coarse buffer region: give out-of-core emissions their own (coarse) flux
# degrees of freedom so their signal does not alias into the core edge or the
# background. The buffer is a nuisance state (cross-covariance tightens the core)
# and is excluded from the reported core total.
#   enabled       = turn the buffer on
#   mode          = coarse (tile out-of-core cells) | mask (label field on the grid)
#   factor        = coarse: integer native-cells per super-cell tile edge
#   resolution_deg= coarse: target super-cell size in degrees (overrides factor)
#   outer_bbox    = coarse/mask: [lat_min, lat_max, lon_min, lon_max] limiting extent
#   mask_file     = mask: path to an integer label field (.npy or .nc; shape = grid),
#                   each positive label -> one super-cell
#   stddev        = prior std on each super-cell flux, relative to its prior mean
#   stddev_floor  = absolute floor for the prior std (prior-flux units); 0 = auto
enabled = True
mode = coarse
factor = 10
;resolution_deg = 0.05
outer_bbox = [39, 43, -77.5, -70]
;mask_file = /path/to/buffer_labels.npy
stddev = 1.0
stddev_floor = 0.0

[decomposition]
# Decompose the posterior flux into super-category totals.
#   enabled = turn decomposition on
#   method  = how to attribute:
#     partition        : solve the per-cell total, split post-hoc by prior
#                        category variance (data constrain the total, prior the split)
#     category_fields  : solve a per-cell scalar field per category, each with its
#                        own covariance (diagonal for point sources, spatial for
#                        diffuse). Data-informed + spatially resolved. RECOMMENDED.
#     category_scalars : domain scalar per category + per-cell total correction
#                        (weakly identified from one flight; prior-sensitive)
enabled = true
method = category_fields

[category_groups]
# Map each inventory's native sub-categories into super-categories by keyword
# (case-insensitive substring of the sub-category label; first match wins;
# unmatched -> 'other'). Edit freely. Comment the whole section out to use the
# built-in default mapping.
natural_gas = ng_, natural gas, fuel exploitation gas
petroleum = petroleum, oil, refineries, refining
coal = coal
landfill = landfill, solid waste, waste incineration, composting, waste burning
wastewater = wastewater, waste water
agriculture = enteric, manure, agricultur, rice, field burning, soils
combustion = combustion, stationary, mobile, power industry, buildings, manufacturing, iron and steel, aviation, shipping, railways, transport, chemical

[category_uncertainty]
# Relative prior uncertainty (1-sigma, fractional) per super-category. Used to
# weight the prior-variance partition and as the per-cell / per-scalar prior sigma
# for the category methods. 'default' applies to groups without an explicit entry.
default = 0.5
# natural_gas = 0.6
# landfill = 0.3
# wastewater = 0.4

[category_spatial]
# Prior-error decorrelation length (km) per super-category, used by the
# category_fields method. 0 = DIAGONAL (point sources with known locations, e.g.
# landfills/WWTPs: only the magnitude at known cells is uncertain). A positive
# value = spatially-correlated prior (diffuse / spatially-uncertain sources).
default = 0
natural_gas = 5
combustion = 5
# landfill = 0      (point source -> diagonal)
# wastewater = 0    (point source -> diagonal)

[flux]
# Integrated totals are reported as (prior emission units) x m^2. Set unit_scale
# to convert into your reporting units once the inventory units are confirmed
# (e.g. mol/m^2/s priors -> mol/s totals; scale further to kt CH4/yr). 1.0 = native.
unit_scale = 1.0
unit_label = prior-units x m^2 (native)

[output]
# Base directory for all run_halo.py outputs (a relative path is resolved against
# this config file's own directory, so outputs stay next to the config regardless
# of the working directory). Each run writes posterior.nc here; use --save NAME to
# put a run in the subdirectory runs/NAME (and also write a reusable bundle there).
dir = runs
