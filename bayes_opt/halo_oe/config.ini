# HALO CH4 flux inversion configuration (consumed by halo_oe/run_halo.py)
#
# Paths are resolved relative to where you launch the script. Adjust to your
# layout. The defaults below point at the in-repo HALO data.

[jacobian]
# One Harvard column-averaged Jacobian file = one flight.
path = ../../stilt/harvard_jacobians/20230726_1.nc
in_memory = true
row_chunk = 16

[domain]
# NYC core mask as [lat_min, lat_max, lon_min, lon_max]. Keep tight while
# testing: it sets the state dimension and the I/O / solve cost.
bbox = [40.4, 41.1, -74.3, -73.5]

[emissions]
# Inventory file and which sources to solve as per-cell scalar blocks.
path = ../../nyc_ch4_emissions.h5
sources = edgar,epa,pitt

[prior]
# Prior std-dev on the (dimensionless) per-cell scalars, and the spatial
# correlation range (km) of the compact-support spherical model (0 = diagonal).
scalar_stddev = 0.5
correlation_length_km = 5.0

[observations]
# STUB background (constant) subtracted from receptor_xch4 to form enhancements,
# and the per-observation measurement error. See halo_oe/background.py to make
# the background real (per-receptor).
baseline = 1.9
error_stddev = 0.02
error_inflation = 1.0

[offset]
# Per-flight residual background offset block (0 disables; 1 = single offset for
# this flight). Optimized jointly with the fluxes.
n_groups = 1
stddev = 0.05

[output]
path = halo_posterior_20230726_1.nc
